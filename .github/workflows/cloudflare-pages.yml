# نشر ثابت على Cloudflare Pages (مجلد out بعد npm run build:pages = تصدير D1 + build:static).
# Secrets: CLOUDFLARE_API_TOKEN (للنشر + لقراءة D1 أثناء التصدير)، CLOUDFLARE_ACCOUNT_ID
# Variables (اختياري): CF_PAGES_PROJECT_NAME — إن لم تُضبط يُستخدم الاسم tasarubat

name: Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run build:pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy out --project-name="${PAGES_NAME:-tasarubat}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PAGES_NAME: ${{ vars.CF_PAGES_PROJECT_NAME }}
